server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: scalora-api
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:scalora}}
    username: ${PGUSER:${DATABASE_USERNAME:postgres}}
    password: ${PGPASSWORD:${DATABASE_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:replace-with-a-strong-256-bit-secret-value}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

logging:
  level:
    com.scalora.api: INFO
    org.springframework.security: WARN
